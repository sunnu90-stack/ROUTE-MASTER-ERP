name: liquid_logistics
description: Route Master ERP - Transport & Logistics Management System
publish_to: 'none'

version: 5.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1

  # Core
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  intl: ^0.20.2

  # Networking
  http: ^1.6.0

  # PDF & Printing
  pdf: ^3.12.0
  printing: ^5.14.3

  # File & Media
  image_picker: ^1.0.7
  file_picker: ^11.0.2
  path_provider: ^2.1.5

  # Sharing & Launching
  url_launcher: ^6.3.2
  share_plus: ^12.0.2

  # Charts & Data
  fl_chart: ^1.2.0
  csv: ^8.0.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.3

  # Google Maps
  google_maps_flutter: ^2.16.0
  google_generative_ai: ^0.4.7
  sms_autofill: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
